services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/arrstack/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped
    networks:
      - arrnet

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/arrstack/sonarr:/config
      - /mnt/downloads:/downloads
      - /mnt/tv:/tv
    ports:
      - "8989:8989"
    restart: unless-stopped
    depends_on:
      - prowlarr
    networks:
      - arrnet

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - /opt/arrstack/radarr:/config
      - /mnt/downloads:/downloads
      - /mnt/movies:/movies
    ports:
      - "7878:7878"
    restart: unless-stopped
    depends_on:
      - prowlarr
    networks:
      - arrnet

networks:
  arrnet:
    external: true
